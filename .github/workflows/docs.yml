name: Docs

on:
  release:
    types: 
      - created
      - published
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doc:
    name: "Documentation build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.12"
          add-pip-as-python-dependency: true
          auto-activate-base: false
          activate-environment: docs
          channel-priority: flexible
          environment-file: .github/environment-docs.yml

      - name: Conda info
        shell: bash -el {0}
        run: |
          conda info -a
          conda list

      - name: Install librosa
        shell: bash -el {0}
        run: python -m pip install --upgrade-strategy only-if-needed -e .[docs]

      #- name: Build documentations
      #  shell: bash -el {0}
      #  run: |
      #    sphinx-multiversion -D smv_latest_version=$(./scripts/get_latest_release.sh) docs build/html
      #    touch build/html/.nojekyll
      #    cp docs/docsite-index-redirect.html build/html/index.html
      #    ln -srf build/html/$(./scripts/get_latest_release.sh) build/html/latest
      - name: Build documentations
        shell: bash -el {0}
        run: |
          sphinx-build -b html docs build/html
          touch build/html/.nojekyll

      - name: Push to web
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DOC_PUBLISH_TOKEN }}
          external_repository: librosa/web-staging
          publish_branch: main
          publish_dir: build/html
          user_name: librosa
          user_email: brian.mcfee@nyu.edu
