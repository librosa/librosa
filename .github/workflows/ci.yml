name: CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
    - 1.0.0dev

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: True

jobs:
    test:
        name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      python-version: "3.9"
                      envfile: ".github/environment-minimal.yml"
                      channel-priority: "flexible"
                      name: "Minimal dependencies"

                    - os: ubuntu-latest
                      python-version: "3.9"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-latest
                      python-version: "3.10"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-latest
                      python-version: "3.11"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-latest
                      python-version: "3.12"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-24.04-arm
                      python-version: "3.13"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: ubuntu-latest
                      python-version: "3.13"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

                    - os: macos-latest
                      python-version: "3.13"
                      channel-priority: "flexible"
                      envfile: ".github/environment-ci.yml"

                    - os: windows-latest
                      python-version: "3.13"
                      channel-priority: "strict"
                      envfile: ".github/environment-ci.yml"

        steps:
        - uses: actions/checkout@v4

        - name: Create short temp directory (Windows only)
          if: runner.os == 'Windows'
          run: mkdir C:\tmp
          shell: cmd

        - name: Set environment variables (Windows only)
          if: runner.os == 'Windows'
          run: |
            echo "TMP=C:\tmp" >> $env:GITHUB_ENV
            echo "TEMP=C:\tmp" >> $env:GITHUB_ENV
          shell: pwsh

        - name: Install OS dependencies
          shell: bash -l {0}
          run: |
            case "${{ runner.os }}" in
            Linux)
              sudo apt-get update -yy
              sudo apt-get install -yy  libsamplerate0
              ;; 
            macOS)
              brew install libsamplerate
              ;;
            esac

        - name: Setup Miniforge
          uses: conda-incubator/setup-miniconda@v3
          with:
            miniforge-version: latest
            activate-environment: test

        - name: Get Date
          id: get-date
          run: echo "today=$(/bin/date -u '+%Y%m%d')" >> $GITHUB_OUTPUT
          shell: bash

        - name: Cache Conda env
          uses: actions/cache@v4
          with:
            path: ${{ env.CONDA }}/envs
            key:
              conda-${{ runner.os }}--${{ runner.arch }}--${{
              steps.get-date.outputs.today }}-${{ env.CACHE_NUMBER
              }}-${{ matrix.python-version }}-${{ hashFiles( matrix.envfile ) }}
          env:
            CACHE_NUMBER: 0
          id: cache

        - name: Update environment
          run:
            mamba env update -n test -f ${{ matrix.envfile }} 
          if: steps.cache.outputs.cache-hit != 'true'

        - name: Conda info
          shell: bash -l {0}
          run: |
            conda info -a
            conda list
            python -c "import scipy; scipy.show_config()"

        - name: Install librosa
          shell: bash -l {0}
          run: python -m pip install --upgrade-strategy only-if-needed -e .[tests]

        - name: Run pytest
          shell: bash -l {0}
          run: pytest --mpl-results-path=mpl_image_results/

        - name: Upload image comparison failures if any
          if: failure() && hashFiles('mpl_image_results/**') != ''
          uses: actions/upload-artifact@v4
          with:
            name: mpl-test-results-${{ runner.os }}--${{ runner.arch }}--${{ matrix.python-version }}
            path: mpl_image_results/
            retention-days: 7

        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@v5
          with:
            token: ${{ secrets.CODECOV_TOKEN }}
            files: ./coverage.xml
            flags: unittests
            env_vars: OS,PYTHON
            name: codecov-umbrella
            fail_ci_if_error: true
            verbose: true
