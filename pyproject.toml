[build-system]
requires = [
    "setuptools >= 48",
    "wheel >= 0.29.0",
]
build-backend = 'setuptools.build_meta'

[tool.ruff]
line-length = 119

[tool.ruff.lint]
#select = ["E9", "F63", "F7", "F82", "D"]
#select = ["E", "D", "F", "S", "W", "I"]
select = ["E", "F", "S", "D", "W"]
ignore = [
    "D107",
    "D203",
    "D205",
    "D212",
    "D213",
    "D400",
    "D402",
    "D413",
    "D415",
    "D416",
    "D417",
    "S101",
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
"**/__init__.pyi" = ["F401"]
